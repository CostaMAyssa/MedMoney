    // Criando uma URL para o Blob
    window.envURL = URL.createObjectURL(envBlob);
    
    // Redirecionando todas as solicitações para assets/.env
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (url && typeof url === 'string') {
        // Se for uma solicitação para o arquivo .env
        if (url.includes('assets/.env')) {
          console.log('Interceptando requisição para .env');
          return fetch(window.envURL);
        }
        
        // Se for uma solicitação para outros arquivos de ambiente
        if (url.includes('.env') || url.endsWith('/')) {
          console.log('Possível requisição de ambiente:', url);
        }
      }
      
      return originalFetch(url, options);
    };

    // Polyfill para resolver problemas de tipo
    if (typeof Number.isInteger !== 'function') {
      Number.isInteger = function(value) {
        return typeof value === 'number' && 
          isFinite(value) && 
          Math.floor(value) === value;
      };
    }

    // Helpers para resolver problemas de tipo
    window.ensureInt = function(value) {
      if (value === null || value === undefined) return 0;
      if (Number.isInteger(value)) return value;
      return Math.floor(Number(value)) || 0;
    };

  <script>
    window.addEventListener('load', function(ev) {

      // Criar um link para o arquivo .env em assets

      linkElement.rel = 'prefetch';
      linkElement.as = 'fetch';
      linkElement.href = window.envURL;
      document.head.appendChild(linkElement);
      
      // Inicializar Flutter
      _flutter = {};
      _flutter.loader = {};
      
      // Função para inicializar o Flutter
      _flutter.loader.load = function(options) {
        try {
          // Expor variáveis para o Dart acessar diretamente
          window.flutterConfig = {
            supabaseUrl: window.SUPABASE_URL,
            supabaseAnonKey: window.SUPABASE_ANON_KEY,
            supabaseServiceKey: window.SUPABASE_SERVICE_KEY,
            asaasApiKey: window.ASAAS_API_KEY,
            asaasSandbox: window.ASAAS_SANDBOX === 'true'
          };
          
          // Criar função ponte para o Dart acessar
          window.getFlutterConfig = function(key) {
            return window.flutterConfig[key];
          };
          
          // Carregar o script Dart
          const main = document.createElement('script');
          main.src = 'main.dart.js';
          main.type = 'application/javascript';
          document.body.appendChild(main);
          
          // Esconder a tela de carregamento quando o app estiver pronto
          window.addEventListener('flutter-first-frame', function() {
            if (loading) loading.remove();
          });
        } catch (e) {
          console.error('Erro ao carregar Flutter:', e);
        }
      };
      
      _flutter.loader.load();
    });
