  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      var loading = document.querySelector('.loading');
      
      _flutter = {};
      _flutter.loader = {};
      
      // Inicializar Flutter adequadamente
      _flutter.loader.load = function(options) {
        try {
          const main = document.createElement('script');
          main.src = 'main.dart.js';
          main.type = 'application/javascript';
          document.body.appendChild(main);
          
          // Esconder a tela de carregamento quando o app estiver pronto
          window.addEventListener('flutter-first-frame', function() {
            if (loading) loading.remove();
          });
        } catch (e) {
          console.error('Erro ao carregar Flutter:', e);
        }
      };
      
      _flutter.loader.load();
    });
  </script>
